name: Update Market Data

on:
  schedule:
    - cron: '0 0,6,12,18 * * 1-5' # Run every 6 hours on weekdays
  workflow_dispatch: # Allow manual trigger

# 봇(bot)이 변경된 파일을 커밋하고 푸시할 수 있도록 쓰기 권한 부여
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # We are using standard library json, os, datetime, urllib.request, so no external dependencies are needed right now!
          # If we add yfinance or requests later, we will install them here.

      - name: Run data fetch script
        run: python scripts/fetch_market_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/public/data/market-state.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update market-state.json" && git push)
